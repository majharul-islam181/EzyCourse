name: ezycourse
description: "A project that builds a Coaching Module for a mobile learning platform using Flutter."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP API requests
  dio: ^5.10.0
  # BLoC state management
  flutter_bloc: ^9.1.1
  # Easy object comparison
  equatable: ^2.1.0
  # Functional programming & error handling
  dartz: ^0.10.1
  # Logs API requests/responses
  pretty_dio_logger: ^1.4.0
  # Dependency Injection (Service Locator)
  get_it: ^9.2.1
  # Network images with caching
  cached_network_image: ^3.4.1
  # Monitor network connectivity
  connectivity_plus: ^7.3.0
  # Declarative app navigation
  go_router: ^17.3.0
  # Store simple key-value data
  shared_preferences: ^2.5.5
  # Secure storage for sensitive data
  flutter_secure_storage: ^10.3.1
  # Lightweight local database
  hive: ^2.2.3
  # Render SVG assets and icons
  flutter_svg: ^2.3.0
  intl: ^0.20.3
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

